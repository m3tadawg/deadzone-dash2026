<style>
    /* Custom utility classes based on Brand Guidance */
    .clip-tr {
        clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
    }
    .clip-tl {
        clip-path: polygon(12px 0, 100% 0, 100% 100%, 0 100%, 0 12px);
    }
    .bg-noise {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    }
</style>

<body class="bg-background text-on-background h-screen w-screen overflow-hidden relative font-['Inter'] antialiased">
<!-- Game Background Layer -->
<div class="absolute inset-0 z-0 bg-zinc-900 overflow-hidden">

<div class="absolute inset-0 bg-primary-container/5 mix-blend-overlay pointer-events-none"></div>
<!-- Vignette -->
<div class="absolute inset-0 shadow-[inset_0_0_150px_rgba(0,0,0,0.9)] pointer-events-none"></div>
</div>
<!-- TopAppBar (JSON Sourced) -->
<nav class="fixed top-0 w-full h-12 border-b-2 border-zinc-800 bg-zinc-950/80 backdrop-blur-md flex justify-between items-center px-6 z-50 shadow-[0_2px_10px_rgba(42,255,0,0.1)]">
<div class="flex items-center">
<span class="text-lime-400 font-black tracking-widest border-r-2 border-lime-400 pr-4 mr-4 font-['Space_Grotesk'] uppercase text-lg">SECTOR_07_TACTICAL_HUD</span>
<div class="flex gap-6 font-['Space_Grotesk'] uppercase tracking-tighter font-bold">
<span class="text-lime-400 border-b-2 border-lime-400 pb-1">WAVE 12</span>
<span class="text-zinc-500">KILLS: 2,450</span>
<span class="text-zinc-500">SCORE: 124,000</span>
</div>
</div>
<div class="flex gap-4 text-zinc-500">
<button class="hover:bg-lime-400/10 hover:text-lime-300 transition-colors p-1 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">settings</span>
</button>
<button class="hover:bg-lime-400/10 hover:text-lime-300 transition-colors p-1 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">terminal</span>
</button>
</div>
</nav>
<!-- HUD SAFE ZONE CONTAINER -->
<div class="absolute inset-0 pointer-events-none z-10 flex flex-col justify-between p-hud-safe-zone pt-[calc(48px+3rem)]">

<div class="flex-1 w-full relative">
<!-- Tactical Reticle / Center Marker (Decorative) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 opacity-20 pointer-events-none flex items-center justify-center">
<div class="w-[2px] h-full bg-primary-container"></div>
<div class="h-[2px] w-full bg-primary-container absolute"></div>
<div class="w-4 h-4 border border-primary-container rounded-full absolute"></div>
</div>
</div>
<!-- Bottom HUD Section -->
<div class="w-full flex justify-between items-end gap-gutter h-auto mt-auto">

<div class="flex flex-col gap-unit w-64 pointer-events-auto">
<!-- Health Bar -->
<div class="flex flex-col gap-1">
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase">HP / Vitals</span>
<div class="h-8 bg-surface-container-high border-2 border-surface-variant p-1 flex gap-1 clip-tl relative overflow-hidden bg-noise">

<div class="h-full flex-1 bg-primary-container shadow-[0_0_10px_rgba(42,255,0,0.5)]"></div>
<div class="h-full flex-1 bg-surface-variant"></div>

<div class="absolute inset-0 bg-[linear-gradient(transparent_50%,rgba(0,0,0,0.2)_50%)] bg-[length:100%_4px] pointer-events-none"></div>
</div>
</div>
<!-- Stamina Bar -->
<div class="flex flex-col gap-1 mt-2">
<div class="flex justify-between items-end">
<span class="font-label-bold text-[10px] text-secondary-container uppercase tracking-widest">Stamina</span>

</div>

<div class="h-full bg-secondary-container w-4/5 shadow-[0_0_8px_rgba(254,183,0,0.4)]"></div>
</div>
</div>
</div>
<!-- Bottom-Center: SideNavBar (Repurposed as Hotbar based on JSON struct) -->
<div class="bg-zinc-950/90 border-2 border-zinc-800 clip-tr pointer-events-auto flex items-end p-2 gap-2 h-auto">
<!-- Slot 1 (Active) -->
<div class="bg-primary-container text-black p-2 border-2 border-white flex flex-col items-center justify-center w-16 h-16 relative">
<span class="absolute top-1 left-1 font-label-bold text-[10px]">1</span>
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">military_tech</span>
</div>
<!-- Slot 2 -->

</div>
<!-- Slot 4 (Empty) -->

<span class="absolute top-1 left-1 font-label-bold text-[10px]">4</span>
</div>
<!-- Slot 5 (Empty) -->
<div class="text-zinc-600 p-2 border border-zinc-800 border-dashed hover:border-zinc-600 transition-colors flex flex-col items-center justify-center w-14 h-14 relative bg-surface-container-low/50">

</div>
</div>

<span class="font-data-num text-data-num text-primary-container drop-shadow-[0_0_8px_rgba(42,255,0,0.6)]">30</span>
<span class="font-headline-md text-headline-md text-surface-variant">/</span>
